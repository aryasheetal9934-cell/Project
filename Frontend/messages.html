<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FomoGram Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="messages.css"/>
</head>
<body>

  <div class="web">

    <aside class="sidebar">
      <h1 class="logo">FomoGram</h1>
      <nav class="nav-links">
        <a href="home.html"         class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
        <a href="explore.html"       class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Explore</a>
        <a href="notification.html" class="nav-item"><i class="fa-solid fa-bell"></i> Notifications</a>
        <a href="messages.html"      class="nav-item active"><i class="fa-solid fa-envelope"></i> Messages</a>
        <a href="bookmarks.html"     class="nav-item"><i class="fa-solid fa-bookmark"></i> Bookmarks</a>
        <a href="profile.html"       class="nav-item"><i class="fa-solid fa-user"></i> Profile</a>
      </nav>
      <button class="post-btn">Post</button>
    </aside>

    <main class="messages-main">

      <section class="chat-list">
        <div class="msg-header">
          <h2>Messages</h2>
          <button class="compose-icon" title="New Message">
            <i class="fa-solid fa-pen-to-square"></i>
          </button>
        </div>

        <div class="msg-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search Direct Messages" />
        </div>

        <div class="inbox-empty">
          <i class="fa-regular fa-comment"></i>
          <h3>Empty inbox</h3>
          <p>Message someone</p>
        </div>
      </section>

      <section class="convo-panel">
        <div class="convo-empty">
          <div class="convo-icon">
            <i class="fa-regular fa-comment"></i>
          </div>
          <h3>Start Conversation</h3>
          <p>Choose from your existing conversations, or start a new one.</p>
          <button class="new-chat-btn">New chat</button>
        </div>
      </section>

    </main>

    <script src="messages.js"></script>

</body>
</html>
