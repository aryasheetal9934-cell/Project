<!DOCTYPE html>
<html>
<head>
    <title>Signup Form</title>
    <link rel="stylesheet" href="css/style.css">
    <href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="tabs">
        <button class="login">Log In</button>
        <button class="signup active">Sign Up</button>
    </div>

    <h1>Create account ✨</h1>
    <p>Join Fomogram and never miss a moment.</p>

    <label>Full Name</label>
    <input type="text" placeholder="sheetal arya">

    <label>Username</label>
    <input type="text" placeholder="@sheetal_30">

    <label>Email</label>
    <input type="email" placeholder="sheetal@example.com">

    <label>Password</label>
    <div class="password-box">
        <input type="password" placeholder="Min. 8 characters">
        <i class="fa-regular fa-eye"></i>
    </div>
     <a href="home.html">
    <button class="create-btn">Create Account</button>
</a>
    <div class="divider">
        <span></span>
        <p>or sign up with</p>
        <span></span>
    </div>
<form action="https://www.google.com/webhp">
    <div class="social">
        <button><i class="fa-brands fa-google"></i> Google</button>
<button><i class="fa-solid fa-envelope"></i>Email</button>
    </div>
</form>
</div>

</body>
</html>
